services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.production
    ports:
      - "5000:5000"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.athoo.pk}
    ports:
      - "8080:80"
    restart: unless-stopped
