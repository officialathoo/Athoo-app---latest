name: Athoo CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify code, tests, security, operations, and builds
        run: pnpm release:verify:code
      - name: Validate mobile release configuration
        run: pnpm mobile:validate
      - name: Validate beta and device acceptance preparation
        run: pnpm beta:validate && pnpm device:validate
