services:
  - type: web
    name: athoo-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm db:migrate && pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_ENVIRONMENT
        value: production
      - key: RELEASE_SERVICE_NAME
        value: athoo-api
      - key: RELEASE_VERSION
        value: rc2-candidate
      - key: RELEASE_COMMIT_SHA
        sync: false
      - key: RELEASE_BUILD_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: OTP_HASH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_BASE_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: r2
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: QUEUE_PROVIDER
        value: postgres
      - key: CACHE_PROVIDER
        value: memory
      - key: PUSH_PROVIDER
        value: expo
      - key: PUSH_PROVIDER_ENDPOINT
        value: https://exp.host/--/api/v2/push/send
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: PUSH_TIMEOUT_MS
        value: "10000"
      - key: EXPO_PUSH_BATCH_SIZE
        value: "100"
      - key: PUSH_MAX_ATTEMPTS
        value: "3"
      - key: PUSH_RETRY_BASE_MS
        value: "500"
      - key: PUSH_BADGE_COUNT
        value: "1"
      - key: NOTIFICATION_CHANNEL_VERSION
        value: "3"
      - key: NOTIFICATION_JOB_CHANNEL_ID
        value: jobs-v3
      - key: NOTIFICATION_JOB_SOUND
        value: athoo_job.wav
      - key: NOTIFICATION_JOB_TTL_SECONDS
        value: "900"
      - key: NOTIFICATION_MESSAGE_CHANNEL_ID
        value: messages-v3
      - key: NOTIFICATION_MESSAGE_SOUND
        value: athoo_message.wav
      - key: NOTIFICATION_MESSAGE_TTL_SECONDS
        value: "86400"
      - key: NOTIFICATION_GENERAL_CHANNEL_ID
        value: general-v3
      - key: NOTIFICATION_GENERAL_SOUND
        value: athoo_general.wav
      - key: NOTIFICATION_GENERAL_TTL_SECONDS
        value: "86400"
      - key: NOTIFICATION_CALL_CHANNEL_ID
        value: calls-v3
      - key: NOTIFICATION_CALL_SOUND
        value: athoo_call.wav
      - key: NOTIFICATION_CALL_TTL_SECONDS
        value: "35"
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_REQUIRE_TLS
        value: "true"
      - key: SMTP_TLS_REJECT_UNAUTHORIZED
        value: "true"
